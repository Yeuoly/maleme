name: Deploy Leaderboard

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    environment: production

    defaults:
      run:
        working-directory: web

    env:
      GITHUB_CLIENT_ID: ${{ secrets.MALEME_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.MALEME_GITHUB_CLIENT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro app
        run: pnpm build

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          packageManager: pnpm
          command: d1 migrations apply maleme-leaderboard --remote --env production

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          environment: production
          workingDirectory: web
          packageManager: pnpm
          command: deploy --env production
          secrets: |
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
            SESSION_SECRET
